name: Publish npm package

on:
  release:
    types: [published]

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ github.event.release.tag_name }}" ]; then
            echo "Release tag ${{ github.event.release.tag_name }} does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - run: npm test

      - run: npm pack --dry-run

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
